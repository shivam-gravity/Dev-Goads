name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: polluxa
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/polluxa?schema=public
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply migrations
        run: npm run db:deploy --workspace apps/api
      - name: Typecheck & build
        run: npm run build --workspace apps/api
      - name: Test
        run: npm test --workspace apps/api

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck & build
        run: npm run build --workspace apps/web
      # E2E smoke test (Playwright). The config's webServer starts the Vite dev server itself;
      # every backend call is mocked in-spec (page.route), so no API/DB/Redis is needed here.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: E2E smoke test
        run: npm run test:e2e --workspace apps/web

  scraper-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts # skips `playwright install chromium` — not needed just to typecheck/build
      - name: Typecheck & build
        run: npm run build --workspace apps/scraper-service
