server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Mirrors apps/web/vite.config.ts's dev-server proxy rules, so the same relative-path
  # API calls (BASE_URL = "/api" in src/api/client.ts) work identically in prod.
  location /api/ {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /objects/ {
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
  }

  # SPA fallback — any route not handled above resolves to index.html so client-side
  # routing (react-router) owns the path instead of nginx 404ing on a hard refresh.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
