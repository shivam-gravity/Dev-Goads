# Wraps the whole platform — api, web, scraper-service, and all 7 background workers —
# alongside Postgres/Redis, so `docker compose up -d --build` is
# the one command that starts everything with restart-on-crash. Before first run: copy
# .env.example to .env and fill in JWT_SECRET / INTERNAL_SERVICE_KEY / TOKEN_ENCRYPTION_KEY
# (compose refuses to start without them — see .env.example for how to generate them).
#
# Local per-service dev without Docker is untouched — `npm run dev:api` etc. still work
# exactly as before; this file is the containerized/production-shaped path.

x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@pgbouncer:6432/${POSTGRES_DB:-polluxa}?schema=public
  REDIS_URL: redis://redis:6379
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set — see .env.example}
  INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:?INTERNAL_SERVICE_KEY must be set — see .env.example}
  TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?TOKEN_ENCRYPTION_KEY must be set — see .env.example}
  CRM_JWT_SHARED_SECRET: ${CRM_JWT_SHARED_SECRET:-dev-crm-shared-secret}
  PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:8080}
  CRM_ORIGIN: ${CRM_ORIGIN:-}
  SCRAPER_SERVICE_URL: http://scraper-service:4003
  SENTRY_DSN: ${SENTRY_DSN:-}
  AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
  AWS_REGION: ${AWS_REGION:-us-east-1}
  BEDROCK_MODEL: ${BEDROCK_MODEL:-us.anthropic.claude-sonnet-4-5-20250929-v1:0}
  BEDROCK_EMBEDDING_MODEL: ${BEDROCK_EMBEDDING_MODEL:-amazon.titan-embed-text-v2:0}
  SEARXNG_BASE_URL: http://searxng:8080
  CRAWL4AI_BASE_URL: http://crawl4ai:11235
  CRAWL4AI_API_TOKEN: ${CRAWL4AI_API_TOKEN:-}
  RUNWAY_API_KEY: ${RUNWAY_API_KEY:-}
  SCRAPEGRAPH_SERVICE_URL: ${SCRAPEGRAPH_SERVICE_URL:-}
  META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
  META_AD_ACCOUNT_ID: ${META_AD_ACCOUNT_ID:-}
  META_APP_ID: ${META_APP_ID:-}
  META_APP_SECRET: ${META_APP_SECRET:-}
  META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN:-}
  META_OAUTH_REDIRECT_URI: ${PUBLIC_ORIGIN:-http://localhost:8080}/api/integrations/meta/oauth/callback
  GOOGLE_ADS_DEVELOPER_TOKEN: ${GOOGLE_ADS_DEVELOPER_TOKEN:-}
  GOOGLE_ADS_CUSTOMER_ID: ${GOOGLE_ADS_CUSTOMER_ID:-}
  GOOGLE_ADS_ACCESS_TOKEN: ${GOOGLE_ADS_ACCESS_TOKEN:-}
  GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
  GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
  GOOGLE_OAUTH_REDIRECT_URI: ${PUBLIC_ORIGIN:-http://localhost:8080}/api/integrations/google/oauth/callback
  TIKTOK_ACCESS_TOKEN: ${TIKTOK_ACCESS_TOKEN:-}
  TIKTOK_ADVERTISER_ID: ${TIKTOK_ADVERTISER_ID:-}
  CRM_INTERNAL_SERVICE_KEY: ${CRM_INTERNAL_SERVICE_KEY:-}
  SHOPIFY_STORE_DOMAIN: ${SHOPIFY_STORE_DOMAIN:-}
  SHOPIFY_ADMIN_ACCESS_TOKEN: ${SHOPIFY_ADMIN_ACCESS_TOKEN:-}
  WOOCOMMERCE_STORE_URL: ${WOOCOMMERCE_STORE_URL:-}
  WOOCOMMERCE_CONSUMER_KEY: ${WOOCOMMERCE_CONSUMER_KEY:-}
  WOOCOMMERCE_CONSUMER_SECRET: ${WOOCOMMERCE_CONSUMER_SECRET:-}

x-api-image: &api-image
  build:
    context: .
    dockerfile: docker/Dockerfile.node-service
    args:
      WORKSPACE: apps/api
      DIST_ENTRY: dist/index.js
  image: polluxa-api:local

x-depends-on-datastores: &depends-on-datastores
  pgbouncer:
    condition: service_healthy
  redis:
    condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-polluxa}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-polluxa}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 25
      MAX_CLIENT_CONN: 200
      MAX_DB_CONNECTIONS: 50
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Self-hosted metasearch — now the ONLY web-search backend in infra/searchRouter.ts (Tavily
  # and Serper, the metered paid vendors, were removed). Behind our own network only (not
  # port-published beyond localhost), so its rate limiter is safely disabled in
  # searxng/settings.yml — a public instance would need it, ours only ever serves this
  # platform's own backend.
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Self-hosted crawler/content-extractor — the ONLY external crawl backend now (Firecrawl,
  # the metered vendor, was replaced). infra/scrapeFallback.ts runs this CONCURRENTLY with the
  # in-house Playwright scraper (scraper-service) and merges both results, so crawl4ai's
  # headless render covers JS-heavy pages the in-house HTTP path misses. No per-call quota;
  # reachable only on our own network. Set CRAWL4AI_API_TOKEN to require bearer auth (optional
  # on a private network).
  crawl4ai:
    image: unclecode/crawl4ai:latest
    restart: unless-stopped
    ports:
      - "11235:11235"
    environment:
      # Non-loopback bind (see crawl4ai/config.yml host: 0.0.0.0) requires this token, or the
      # server refuses to start. Must match apps/api's CRAWL4AI_API_TOKEN so the client auth.
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_API_TOKEN:?CRAWL4AI_API_TOKEN must be set — see .env.example}
    volumes:
      # Override the stock config, which binds 127.0.0.1 (unreachable via the published port).
      - ./crawl4ai/config.yml:/app/config.yml:ro
    # Headless-Chromium crawls are shared-memory hungry. 1GB was too small for the pool's page
    # count and caused 500s under the research pipeline's parallel fan-out; 2GB + the config's
    # lowered pool.max_pages (6) keeps crawls reliable. mem_limit bounds total container RAM so a
    # leak can't take the host down.
    shm_size: "2gb"
    mem_limit: "3g"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:11235/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    <<: *api-image
    restart: unless-stopped
    # Runs pending migrations before every boot — safe to repeat on restart (Prisma no-ops
    # once a migration's already applied) and means "the container is up" already implies
    # "the schema is current," instead of a separate manual deploy step.
    command: sh -c "npx prisma migrate deploy --schema ./apps/api/prisma/schema.prisma && node \"$$DIST_ENTRY\""
    environment: *app-env
    ports:
      - "4000:4000"
    volumes:
      - api-objects:/repo/service/apps/api/data/objects
    depends_on: *depends-on-datastores
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5

  scraper-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.scraper-service
    image: polluxa-scraper-service:local
    restart: unless-stopped
    environment: *app-env
    ports:
      - "4003:4003"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4003/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # --- Background workers (apps/api/src/workers/*) — same image as `api`, no HTTP port,
  # just a different compiled entrypoint. BullMQ-backed, so `restart: unless-stopped` is
  # enough for crash recovery: whatever job was mid-flight resumes from Redis on restart. ---

  campaign-generation-worker:
    <<: *api-image
    restart: unless-stopped
    command: ["node", "dist/workers/campaignGenerationWorker.js"]
    environment: *app-env
    depends_on: *depends-on-datastores

  creative-generation-worker:
    <<: *api-image
    restart: unless-stopped
    command: ["node", "dist/workers/creativeGenerationWorker.js"]
    environment: *app-env
    depends_on: *depends-on-datastores

  lead-ingestion-worker:
    <<: *api-image
    restart: unless-stopped
    command: ["node", "dist/workers/leadIngestionWorker.js"]
    environment: *app-env
    depends_on: *depends-on-datastores

  metrics-ingestion-worker:
    <<: *api-image
    restart: unless-stopped
    command: ["node", "dist/workers/metricsIngestionWorker.js"]
    environment: *app-env
    depends_on: *depends-on-datastores

  research-orchestrator-worker:
    <<: *api-image
    restart: unless-stopped
    command: ["node", "dist/workers/researchOrchestratorWorker.js"]
    environment: *app-env
    depends_on: *depends-on-datastores

  research-session-worker:
    <<: *api-image
    restart: unless-stopped
    command: ["node", "dist/workers/researchSessionWorker.js"]
    environment: *app-env
    depends_on: *depends-on-datastores

  crm-webhook-worker:
    <<: *api-image
    restart: unless-stopped
    command: ["node", "dist/workers/crmWebhookWorker.js"]
    environment: *app-env
    depends_on: *depends-on-datastores

volumes:
  postgres-data:
  redis-data:
  api-objects:
